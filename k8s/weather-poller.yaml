apiVersion: apps/v1
kind: Deployment
metadata:
  name: housepanel-weather-poller
  namespace: housepanel
  labels:
    app: housepanel-weather-poller
    app.kubernetes.io/part-of: housepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: housepanel-weather-poller
  template:
    metadata:
      labels:
        app: housepanel-weather-poller
    spec:
      serviceAccountName: housepanel-weather-poller
      automountServiceAccountToken: false
      volumes:
        - name: google-adc
          secret:
            secretName: google-adc
      containers:
        - name: weather-poller
          image: laminarflow:30500/housepanel/weather-poller:0.1.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          envFrom:
            - secretRef:
                name: housepanel-weather-secrets
          env:
            - name: PYTHONPATH
              value: "/app/src"
            - name: AGGREGATOR_URL
              value: "http://housepanel-aggregator:8001"
            - name: WEATHER_POLL_INTERVAL_SECONDS
              value: "900"
            - name: WEATHER_PRIMARY_PROVIDER
              value: "wttr_in"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/secrets/google-adc/application_default_credentials.json"
            - name: LOG_LEVEL
              value: "INFO"
          volumeMounts:
            - name: google-adc
              mountPath: /secrets/google-adc
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 30
