apiVersion: apps/v1
kind: Deployment
metadata:
  name: housepanel-calendar-poller
  namespace: housepanel
  labels:
    app: housepanel-calendar-poller
    app.kubernetes.io/part-of: housepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: housepanel-calendar-poller
  template:
    metadata:
      labels:
        app: housepanel-calendar-poller
    spec:
      serviceAccountName: housepanel-calendar-poller
      automountServiceAccountToken: false
      volumes:
        - name: google-adc
          secret:
            secretName: google-adc
      containers:
        - name: calendar-poller
          image: laminarflow:30500/housepanel/calendar-poller:0.1.5
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "calendar_poller.main:app", "--host", "0.0.0.0", "--port", "8003"]
          ports:
            - containerPort: 8003
          env:
            - name: PYTHONPATH
              value: "/app/src"
            - name: AGGREGATOR_URL
              value: "http://housepanel-aggregator:8001"
            - name: CALENDAR_POLL_INTERVAL_SECONDS
              value: "300"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/secrets/google-adc/application_default_credentials.json"
            - name: GOOGLE_CALENDAR_ID
              valueFrom:
                configMapKeyRef:
                  name: housepanel-config
                  key: GOOGLE_CALENDAR_ID
            - name: LOG_LEVEL
              value: "INFO"
          volumeMounts:
            - name: google-adc
              mountPath: /secrets/google-adc
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: housepanel-calendar-poller
  namespace: housepanel
  labels:
    app.kubernetes.io/part-of: housepanel
spec:
  type: ClusterIP
  selector:
    app: housepanel-calendar-poller
  ports:
    - port: 8003
      targetPort: 8003
