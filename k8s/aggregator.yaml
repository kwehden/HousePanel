apiVersion: apps/v1
kind: Deployment
metadata:
  name: housepanel-aggregator
  namespace: housepanel
  labels:
    app: housepanel-aggregator
    app.kubernetes.io/part-of: housepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: housepanel-aggregator
  template:
    metadata:
      labels:
        app: housepanel-aggregator
    spec:
      serviceAccountName: housepanel-aggregator
      automountServiceAccountToken: false
      containers:
        - name: aggregator
          image: laminarflow:30500/housepanel/aggregator:0.1.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: TZ
              value: "America/Los_Angeles"
            - name: PYTHONPATH
              value: "/app/src"
            - name: TRANSPORT_ADAPTER_URL
              value: "http://housepanel-transport-adapter:8002"
            - name: TICKER_QUEUE_MAX_DEPTH
              value: "20"
            - name: TICKER_EVENT_TTL_SECONDS
              value: "60"
            - name: TICKER_DEDUP_WINDOW_SECONDS
              value: "30"
            - name: TICKER_DRAIN_INTERVAL_SECONDS
              value: "1"
            - name: DOORBELL_TIMEOUT_SECONDS
              value: "30"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /internal/health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: housepanel-aggregator
  namespace: housepanel
  labels:
    app.kubernetes.io/part-of: housepanel
spec:
  type: ClusterIP
  selector:
    app: housepanel-aggregator
  ports:
    - port: 8001
      targetPort: 8001
