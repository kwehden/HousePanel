apiVersion: apps/v1
kind: Deployment
metadata:
  name: housepanel-ring-integration
  namespace: housepanel
  labels:
    app: housepanel-ring-integration
    app.kubernetes.io/part-of: housepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: housepanel-ring-integration
  template:
    metadata:
      labels:
        app: housepanel-ring-integration
    spec:
      serviceAccountName: housepanel-ring-integration
      automountServiceAccountToken: true
      containers:
        - name: ring-integration
          image: laminarflow:30500/housepanel/ring-integration:0.1.1
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "ring_integration.main:app", "--host", "0.0.0.0", "--port", "8005"]
          ports:
            - containerPort: 8005
          envFrom:
            - secretRef:
                name: housepanel-ring-secrets
          env:
            - name: PYTHONPATH
              value: "/app/src"
            - name: AGGREGATOR_URL
              value: "http://housepanel-aggregator:8001"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8005
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8005
            initialDelaySeconds: 30
            periodSeconds: 30
