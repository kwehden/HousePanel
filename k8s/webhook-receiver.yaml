apiVersion: apps/v1
kind: Deployment
metadata:
  name: housepanel-webhook-receiver
  namespace: housepanel
  labels:
    app: housepanel-webhook-receiver
    app.kubernetes.io/part-of: housepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: housepanel-webhook-receiver
  template:
    metadata:
      labels:
        app: housepanel-webhook-receiver
    spec:
      serviceAccountName: housepanel-webhook-receiver
      automountServiceAccountToken: false
      containers:
        - name: webhook-receiver
          image: laminarflow:30500/housepanel/webhook-receiver:0.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: housepanel-webhook-secrets
          env:
            - name: PYTHONPATH
              value: "/app/src"
            - name: AGGREGATOR_URL
              value: "http://housepanel-aggregator:8001"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: housepanel-webhook-receiver
  namespace: housepanel
  labels:
    app.kubernetes.io/part-of: housepanel
spec:
  type: NodePort
  selector:
    app: housepanel-webhook-receiver
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
