apiVersion: apps/v1
kind: Deployment
metadata:
  name: housepanel-transport-adapter
  namespace: housepanel
  labels:
    app: housepanel-transport-adapter
    app.kubernetes.io/part-of: housepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: housepanel-transport-adapter
  template:
    metadata:
      labels:
        app: housepanel-transport-adapter
    spec:
      serviceAccountName: housepanel-transport-adapter
      automountServiceAccountToken: false
      containers:
        - name: transport-adapter
          image: laminarflow:30500/housepanel/transport-adapter:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            - name: PYTHONPATH
              value: "/app/src"
            - name: AGGREGATOR_URL
              value: "http://housepanel-aggregator:8001"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /internal/health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: housepanel-transport-adapter
  namespace: housepanel
  labels:
    app.kubernetes.io/part-of: housepanel
spec:
  type: NodePort
  selector:
    app: housepanel-transport-adapter
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      nodePort: 30802
